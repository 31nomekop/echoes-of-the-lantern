<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Echoes of the Lantern</title>
<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">
</head>
<body>

<div id="menu">
<h1>Echoes of the Lantern</h1>
<button onclick="startGame()">Continue</button>
<button onclick="startGame()">New Game</button>
<button onclick="openArchive()">Echo Archive</button>
<button onclick="openSettings()">Settings</button>
<button onclick="openCredits()">Credits</button>
</div>

<div id="game" style="display:none">
<canvas id="c" width="360" height="640"></canvas>
<button onclick="back()">Back</button>
</div>

<div id="archive" style="display:none">
<h2>Echo Archive</h2>
<div id="list"></div>
<button onclick="back()">Back</button>
</div>

<div id="settings" style="display:none">
<h2>Settings</h2>
<label>Developer Mode <input type="checkbox" id="dev"></label>
<button onclick="back()">Back</button>
</div>

<div id="credits" style="display:none">
<h2>Credits</h2>
<p>Prototype build</p>
<button onclick="back()">Back</button>
</div>

<script src="game.js"></script>
</body>
</html>
